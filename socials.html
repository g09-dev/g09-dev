<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socials — Gold Gaming09</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --bg-canvas: #05050a;
            --surface-card: rgba(13, 13, 33, 0.45);
            --surface-glass: rgba(255, 255, 255, 0.03);
            --border-subtle: rgba(255, 255, 255, 0.07);
            --accent-blue: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-canvas);
            background-image: radial-gradient(circle at 50% -20%, rgba(59, 130, 246, 0.12) 0%, transparent 50%);
            color: var(--text-primary); min-height: 100vh; line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 10, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            width: max-content;
        }

        nav button {
            background: transparent;
            border: 1px solid transparent;
            padding: 0.65rem 1.25rem;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        nav button span { font-size: 18px; }
        nav button:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.04); }
        nav button.active { background: var(--surface-glass); border-color: var(--border-subtle); color: var(--text-primary); box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); }

        .container { max-width: 850px; margin: 0 auto; padding: 180px 20px 60px; }
        
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.02em; text-align: center; }
        .subtitle { color: var(--text-secondary); margin-bottom: 4rem; text-align: center; }

        .socials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        
        .social-card {
            background: var(--surface-card); padding: 3.5rem 2.5rem; border-radius: 32px;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle); text-align: center;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }

        .social-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.15);
        }

        .social-card .icon { font-size: 3rem; margin-bottom: 1.25rem; color: var(--text-primary); }
        .social-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 700; margin-bottom: 0.5rem; }

        .social-handle { font-size: 1.15rem; font-weight: 500; margin-bottom: 2rem; color: var(--text-secondary); }

        .action-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-subtle);
            color: var(--text-primary); padding: 0.65rem 1.75rem; border-radius: 24px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); font-size: 0.9rem;
        }

        .action-btn:hover {
            background: var(--text-primary); color: var(--bg-canvas); border-color: transparent;
        }

        @media (max-width: 768px) {
            nav { width: 90%; border-radius: 20px; top: 1rem; }
            nav button { padding: 0.5rem 1rem; font-size: 0.85rem; }
            .container { padding-top: 240px; }
            h1 { font-size: 2.25rem; }
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="window.location.href='index.html#piezo'">
            <span class="material-symbols-outlined">bolt</span> Piezo Plate
        </button>
        <button onclick="window.location.href='index.html#swords'">
            <span class="material-symbols-outlined">swords</span> Swords Mod
        </button>
        <button onclick="window.location.href='achievements.html'">
            <span class="material-symbols-outlined">trophy</span> Achievements
        </button>
        <button onclick="window.location.href='socials.html'" class="active">
            <span class="material-symbols-outlined">share</span> Socials
        </button>
        <button onclick="window.location.href='about.html'">
            <span class="material-symbols-outlined">person</span> About Me
        </button>
    </nav>

    <div class="container">
        <h1>External Comm Nodes</h1>
        <p class="subtitle">Direct communication pipelines across authenticated remote clients.</p>

        <div class="socials-grid">
            <div class="social-card">
                <span class="material-symbols-outlined icon">forum</span>
                <h3>Discord Identity</h3>
                <div class="social-handle">gold_gaming09</div>
                <button class="action-btn" onclick="copyDiscord()">
                    <span class="material-symbols-outlined" style="font-size: 16px;">content_copy</span> Copy Handle
                </button>
            </div>

            <div class="social-card">
                <span class="material-symbols-outlined icon">photo_camera</span>
                <h3>Instagram Matrix</h3>
                <div class="social-handle">akshat_singh9311</div>
                <a href="https://instagram.com/akshat_singh9311" target="_blank" class="action-btn">
                    <span class="material-symbols-outlined" style="font-size: 16px;">open_in_new</span> Connect Profile
                </a>
            </div>
        </div>
    </div>

    <script>
        function copyDiscord() {
            navigator.clipboard.writeText('gold_gaming09').then(() => {
                const btn = document.querySelector('.action-btn');
                btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">check</span> Copied Account';
                setTimeout(() => {
                    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">content_copy</span> Copy Handle';
                }, 2000);
            });
        }
    </script>
</body>
</html>
