<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socials — Gold Gaming09</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #05050a;
            --surface-card: rgba(13, 13, 33, 0.45);
            --surface-glass: rgba(255, 255, 255, 0.03);
            --border-subtle: rgba(255, 255, 255, 0.07);
            --accent-blue: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-canvas);
            background-image: radial-gradient(circle at 50% -20%, rgba(59, 130, 246, 0.12) 0%, transparent 50%);
            color: var(--text-primary); min-height: 100vh; line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.4rem;
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 10, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 1000;
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            width: max-content;
        }

        nav button {
            background: transparent;
            border: 1px solid transparent;
            padding: 0.65rem 1rem;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        nav button:hover { color: var(--text-primary); }
        nav button.active { background: var(--surface-glass); border-color: var(--border-subtle); color: var(--text-primary); box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); }

        .container { max-width: 850px; margin: 0 auto; padding: 140px 1rem 60px; }
        
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.25rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.02em; text-align: center; }
        .subtitle { color: var(--text-secondary); margin-bottom: 3rem; text-align: center; font-size: 0.95rem; }

        .socials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        
        .social-card {
            background: var(--surface-card); padding: 2.5rem 1.5rem; border-radius: 28px;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle); text-align: center;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.3s ease;
        }

        .social-card .icon-label { font-size: 2.5rem; margin-bottom: 1rem; }
        .social-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        .social-handle { font-size: 1.05rem; margin-bottom: 1.5rem; color: var(--text-secondary); }

        .action-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-subtle);
            color: var(--text-primary); padding: 0.65rem 1.5rem; border-radius: 20px; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: all 0.25s ease; font-size: 0.85rem;
            width: 100%; max-width: 180px; display: block;
        }

        .action-btn:active { background: var(--text-primary); color: var(--bg-canvas); }

        @media (max-width: 600px) {
            nav { width: calc(100% - 20px); overflow-x: auto; border-radius: 24px; padding: 0.3rem; }
            nav button { padding: 0.5rem 0.85rem; font-size: 0.8rem; }
            .container { padding-top: 110px; }
            h1 { font-size: 1.85rem; }
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="window.location.href='index.html#piezo'">Piezo Plate</button>
        <button onclick="window.location.href='index.html#swords'">Swords Mod</button>
        <button onclick="window.location.href='achievements.html'">Achievements</button>
        <button onclick="window.location.href='socials.html'" class="active">Socials</button>
        <button onclick="window.location.href='about.html'">About Me</button>
    </nav>

    <div class="container">
        <h1>External Comm Nodes</h1>
        <p class="subtitle">Direct communication pipelines across authenticated remote clients.</p>

        <div class="socials-grid">
            <div class="social-card">
                <div class="icon-label">💬</div>
                <h3>Discord Identity</h3>
                <div class="social-handle">gold_gaming09</div>
                <button class="action-btn" onclick="copyDiscord()">Copy Handle</button>
            </div>

            <div class="social-card">
                <div class="icon-label">📸</div>
                <h3>Instagram Matrix</h3>
                <div class="social-handle">akshat_singh9311</div>
                <a href="https://instagram.com/akshat_singh9311" target="_blank" class="action-btn">Connect Profile</a>
            </div>
        </div>
    </div>

    <script>
        function copyDiscord() {
            navigator.clipboard.writeText('gold_gaming09').then(() => {
                const btn = document.querySelector('.action-btn');
                btn.textContent = 'Copied Account';
                setTimeout(() => { btn.textContent = 'Copy Handle'; }, 2000);
            });
        }
    </script>
</body>
</html>
