<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements — Gold Gaming09</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --bg-canvas: #05050a;
            --surface-card: rgba(13, 13, 33, 0.45);
            --surface-glass: rgba(255, 255, 255, 0.03);
            --border-subtle: rgba(255, 255, 255, 0.07);
            --accent-blue: #3b82f6;
            --accent-cyan: #10b981;
            --accent-gold: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-canvas);
            background-image: radial-gradient(circle at 50% -20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            color: var(--text-primary); min-height: 100vh; line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 10, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            width: max-content;
        }

        nav button {
            background: transparent;
            border: 1px solid transparent;
            padding: 0.65rem 1.25rem;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        nav button span { font-size: 18px; }
        nav button:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.04); }
        nav button.active { background: var(--surface-glass); border-color: var(--border-subtle); color: var(--text-primary); box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); }

        .container { max-width: 750px; margin: 0 auto; padding: 180px 20px 60px; text-align: center; }
        
        .achievement-box {
            background: var(--surface-card); padding: 4.5rem 3rem; border-radius: 36px;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .trophy-icon { font-size: 4rem; color: var(--accent-gold); margin-bottom: 1.5rem; }
        
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin-bottom: 1rem; font-weight: 700; letter-spacing: -0.02em; }
        
        .live-rank-link {
            display: inline-flex; align-items: center; gap: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle); padding: 1.25rem 2rem; border-radius: 20px;
            color: #fff; text-decoration: none; font-size: 1.1rem; font-weight: 600;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); margin: 2rem 0;
        }

        .live-rank-link:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .live-rank-link .arrow { transition: transform 0.3s ease; color: var(--accent-blue); }
        .live-rank-link:hover .arrow { transform: translateX(4px); }

        .coming-soon-banner {
            font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; color: #f97316;
            letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700;
            margin-top: 2.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            background: rgba(249, 115, 22, 0.05); width: max-content; margin: 2.5rem auto 0;
            padding: 0.5rem 1.25rem; border-radius: 30px; border: 1px solid rgba(249, 115, 22, 0.15);
        }

        @media (max-width: 768px) {
            nav { width: 90%; border-radius: 20px; top: 1rem; }
            nav button { padding: 0.5rem 1rem; font-size: 0.85rem; }
            .container { padding-top: 240px; }
            h1 { font-size: 2.25rem; }
            .achievement-box { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="window.location.href='index.html#piezo'">
            <span class="material-symbols-outlined">bolt</span> Piezo Plate
        </button>
        <button onclick="window.location.href='index.html#swords'">
            <span class="material-symbols-outlined">swords</span> Swords Mod
        </button>
        <button onclick="window.location.href='achievements.html'" class="active">
            <span class="material-symbols-outlined">trophy</span> Achievements
        </button>
        <button onclick="window.location.href='socials.html'">
            <span class="material-symbols-outlined">share</span> Socials
        </button>
        <button onclick="window.location.href='about.html'">
            <span class="material-symbols-outlined">person</span> About Me
        </button>
    </nav>

    <div class="container">
        <div class="achievement-box">
            <span class="material-symbols-outlined trophy-icon">emoji_events</span>
            <h1>Competitive Ladders</h1>
            <p style="color: var(--text-secondary); max-width: 500px; margin: 0 auto;">
                Live performance tracking indexes and combat efficiency ratings inside high-tier global network divisions.
            </p>

            <a href="https://flowpvp.gg/user/Gold_Gaming09" target="_blank" class="live-rank-link">
                <span>Access Live Position Matrix</span>
                <span class="material-symbols-outlined arrow">arrow_forward</span>
            </a>

            <div class="coming-soon-banner">
                <span class="material-symbols-outlined" style="font-size: 16px;">trending_up</span>
                top thousand worldwide soon
            </div>
        </div>
    </div>

</body>
</html>
